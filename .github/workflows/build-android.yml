name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --clean

      - name: Increase Gradle JVM heap
        run: |
          echo "org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties

      - name: Build release APK (JS bundle embedded, standalone)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: touch-learn-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Touch Learn build ${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
